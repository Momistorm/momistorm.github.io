name: Deploy Cocktail Website

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Erlaubt dem GitHub-Token, die Website auf GitHub Pages zu veröffentlichen
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass mehrere Deployments gleichzeitig laufen
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    # NEU: Das zwingt ALLE folgenden 'run'-Schritte, im Unterordner zu starten
    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # HIER AUCH WICHTIG: Pfad zum gebauten Ordner anpassen!
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src/build' # Pfad wurde um './src/' erweitert

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
